<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="A responsive temple album created by Alexis Rivera for WDD 131."
  >
  <meta name="author" content="Alexis Rivera">

  <title>Temple Album | Alexis Rivera</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet"
  >

 <!-- Mobile-first stylesheet -->
<link rel="stylesheet" href="styles/temples.css">

<!-- Large-screen stylesheet -->
<link rel="stylesheet" href="styles/temples-large.css">

<script src="scripts/temples.js" defer></script>
</head>

<body>
  <header>
    <span class="site-title">Temple Album</span>

    <button
      id="menu-button"
      type="button"
      aria-label="Open navigation menu"
      aria-expanded="false"
      aria-controls="navigation"
    >
      ☰
    </button>

    <nav id="navigation">
      <a href="#" class="active">Home</a>
      <a href="#">Old</a>
      <a href="#">New</a>
      <a href="#">Large</a>
      <a href="#">Small</a>
    </nav>
  </header>

  <main>
    <h1>Temple Album</h1>

    <div class="temple-grid">
      <figure>
        <img
          src="images/temple.jpg"
          alt="Monterrey Temple"
          width="600"
          height="400"
        >
        <figcaption>Salt Lake Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="Rome Italy Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>Rome Italy Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="Mexico City Mexico Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>Mexico City Mexico Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="Monterrey Mexico Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>Monterrey Mexico Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="Buenos Aires Argentina Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>Buenos Aires Argentina Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="Provo City Center Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>Provo City Center Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="San Diego California Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>San Diego California Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="Tokyo Japan Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>Tokyo Japan Temple</figcaption>
      </figure>

      <figure>
        <img
          src="images/temple.jpg"
          alt="São Paulo Brazil Temple"
          width="600"
          height="400"
          loading="lazy"
        >
        <figcaption>São Paulo Brazil Temple</figcaption>
      </figure>
    </div>
  </main>

  <footer>
    <p>
      &copy; <span id="currentyear"></span>
      | Alexis Rivera | Mexico
    </p>

    <p id="lastModified"></p>
  </footer>
</body>
</html>
